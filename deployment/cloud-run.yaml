apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ecovibe-concierge
spec:
  template:
    spec:
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/ecovibe-concierge
        ports:
        - containerPort: 8080
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "YOUR_PROJECT_ID"
        - name: ENVIRONMENT
          value: "production"