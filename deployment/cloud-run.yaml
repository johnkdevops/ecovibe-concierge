apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ecovibe-concierge
  labels:
    cloud.googleapis.com/location: us-east1
spec:
  template:
    spec:
      containers:
        - image: gcr.io/eco-vibe-project/ecovibe-concierge:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: 1000m
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: GOOGLE_CLOUD_PROJECT
              value: "eco-vibe-project"
            - name: GEMINI_MODEL
              value: "gemini-3.5-flash"
            - name: GEMINI_FALLBACK_MODEL
              value: "gemini-2.5-flash"